<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<div id="main-content" tabindex="-1" class="container">
    <h2>Najpopularniejsze kursy</h2>
    <div class="table-responsive">
        <table class="table align-middle">
            <thead><tr><th>ID</th><th>Kurs</th><th>Liczba aktywnych zapisów</th></tr></thead>
            <tbody>
            <tr th:each="row : ${popularCourses}">
                <td th:text="${row['courseid']}"></td>
                <td th:text="${row['title']}"></td>
                <td th:text="${row['enrollmentcount']}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(popularCourses)}"><td colspan="3" class="text-center text-muted">Brak danych.</td></tr>
            </tbody>
        </table>
    </div>
    <a th:href="@{/admin/reports}" class="btn btn-secondary">Powrót</a>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
