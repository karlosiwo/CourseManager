<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
<div th:replace="fragments/header :: navbar"></div>
<div class="container">
    <h2>👥 Użytkownicy systemu</h2>
    <table class="table">
        <thead><tr><th>ID</th><th>Login</th><th>Email</th><th>Rola</th><th>Akcja</th></tr></thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.role}"></td>
            <td><a th:href="@{/admin/users/change-role/{id}(id=${u.id})}" class="btn btn-sm btn-outline-secondary">Zmień rolę</a></td>
        </tr>
        </tbody>
    </table>
</div>
<div th:replace="fragments/footer :: footer"></div>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
