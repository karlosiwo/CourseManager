<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<div class="container">
    <h2>Raporty i statystyki</h2>
    <div class="card mt-3">
        <div class="card-body">
            <p>Liczba użytkowników: <strong th:text="${userCount}"></strong></p>
            <p>Liczba kursów: <strong th:text="${courseCount}"></strong></p>
            <p>Liczba zapisów: <strong th:text="${enrollmentCount}"></strong></p>
            <a th:href="@{/admin/reports/popular-courses}" class="btn btn-outline-primary">Pokaż najpopularniejsze kursy</a>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
