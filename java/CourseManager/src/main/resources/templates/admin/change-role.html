<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<div id="main-content" tabindex="-1" class="container" style="max-width: 700px;">
    <div class="card">
        <div class="card-header"><h2>Zmień rolę użytkownika</h2></div>
        <div class="card-body">
            <p>Użytkownik: <strong th:text="${user.username}"></strong></p>
            <form th:action="@{/admin/users/change-role/{id}(id=${user.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label for="role" class="form-label">Rola</label>
                    <select id="role" name="role" class="form-select">
                        <option th:each="role : ${roles}" th:value="${role}" th:text="${role}" th:selected="${role == user.role}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Zapisz rolę</button>
                <a th:href="@{/admin/users}" class="btn btn-secondary">Anuluj</a>
            </form>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
