<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<div id="main-content" tabindex="-1" class="container">
    <h2>Raport wolnych miejsc</h2>
    <div class="table-responsive">
        <table class="table align-middle">
            <caption class="visually-hidden">Lista kursów z liczbą wolnych miejsc</caption>
            <thead><tr><th>ID</th><th>Kurs</th><th>Limit miejsc</th><th>Wolne miejsca</th></tr></thead>
            <tbody>
            <tr th:each="row : ${freeSeats}">
                <td th:text="${row['courseid']}"></td>
                <td th:text="${row['title']}"></td>
                <td th:text="${row['maxseats']}"></td>
                <td><span class="badge bg-info text-dark" th:text="${row['availableseats']}"></span></td>
            </tr>
            <tr th:if="${#lists.isEmpty(freeSeats)}"><td colspan="4" class="text-center text-muted">Brak danych.</td></tr>
            </tbody>
        </table>
    </div>
    <a th:href="@{/admin/reports}" class="btn btn-secondary">Powrót</a>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
