<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf != null ? _csrf.token : ''}">
    <meta name="_csrf_header" th:content="${_csrf != null ? _csrf.headerName : ''}">
    <title>CourseManager</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
<div th:fragment="navbar">
    <a class="visually-hidden-focusable skip-link" href="#main-content">Przejdź do głównej treści</a>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4 rounded-4" aria-label="Główna nawigacja">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/" aria-label="Strona główna CourseManager">📘 CourseManager</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false" aria-label="Przełącz menu nawigacji">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/courses">📋 Kursy</a></li>
                    <li sec:authorize="hasAnyRole('ADMIN','FULL_USER')" class="nav-item"><a class="nav-link" href="/categories">🏷️ Kategorie</a></li>
                    <li sec:authorize="hasAnyRole('ADMIN','FULL_USER')" class="nav-item"><a class="nav-link" href="/instructors">👨‍🏫 Prowadzący</a></li>
                    <li sec:authorize="isAuthenticated()" class="nav-item"><a class="nav-link" href="/my-enrollments">📌 Moje zapisy</a></li>
                    <li sec:authorize="hasAnyRole('ADMIN','FULL_USER')" class="nav-item"><a class="nav-link" href="/shares">🔗 Udostępnianie</a></li>
                    <li sec:authorize="hasRole('ADMIN')" class="nav-item"><a class="nav-link" href="/admin/users">👥 Użytkownicy</a></li>
                    <li sec:authorize="hasRole('ADMIN')" class="nav-item"><a class="nav-link" href="/admin/reports">📊 Raporty</a></li>
                    <li sec:authorize="hasRole('ADMIN')" class="nav-item"><a class="nav-link" href="/swagger-ui/index.html">🧩 Swagger</a></li>
                </ul>
                <div class="d-flex align-items-center" sec:authorize="isAuthenticated()">
                    <span class="user-info me-3">👤 <span sec:authentication="name">User</span></span>
                    <a href="/logout" class="btn btn-outline-danger btn-sm">Wyloguj</a>
                </div>
                <div sec:authorize="isAnonymous()">
                    <a href="/login" class="btn btn-primary btn-sm me-2">Logowanie</a>
                    <a href="/register" class="btn btn-outline-secondary btn-sm">Rejestracja</a>
                </div>
            </div>
        </div>
    </nav>
</div>
</body>
</html>
