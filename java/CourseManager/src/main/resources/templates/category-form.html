<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<div class="container" style="max-width: 700px;">
    <div class="card shadow rounded-4 border-0">
        <div class="card-header bg-white">
            <h3 th:text="${categoryDto.id == null} ? 'Dodaj kategorię' : 'Edytuj kategorię'"></h3>
        </div>
        <div class="card-body">
            <form th:action="${categoryDto.id == null} ? @{/categories/new} : @{/categories/edit/{id}(id=${categoryDto.id})}" th:object="${categoryDto}" method="post" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label for="name" class="form-label">Nazwa</label>
                    <input id="name" type="text" th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" required minlength="3" maxlength="50">
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <button type="submit" class="btn btn-primary">Zapisz</button>
                <a th:href="@{/categories}" class="btn btn-secondary">Anuluj</a>
            </form>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
