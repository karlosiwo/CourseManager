<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<div class="container" style="max-width: 700px;">
    <div class="card shadow rounded-4 border-0">
        <div class="card-header bg-white">
            <h3 th:text="${instructorDto.id == null} ? 'Dodaj prowadzącego' : 'Edytuj prowadzącego'"></h3>
        </div>
        <div class="card-body">
            <form th:action="${instructorDto.id == null} ? @{/instructors/new} : @{/instructors/edit/{id}(id=${instructorDto.id})}" th:object="${instructorDto}" method="post" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                    <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
                </div>
                <div class="mb-3">
                    <label for="firstName" class="form-label">Imię</label>
                    <input id="firstName" type="text" th:field="*{firstName}" class="form-control" th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'" required minlength="2" maxlength="50">
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                </div>
                <div class="mb-3">
                    <label for="lastName" class="form-label">Nazwisko</label>
                    <input id="lastName" type="text" th:field="*{lastName}" class="form-control" th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'" required minlength="2" maxlength="50">
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                </div>
                <button type="submit" class="btn btn-primary">Zapisz</button>
                <a th:href="@{/instructors}" class="btn btn-secondary">Anuluj</a>
            </form>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
