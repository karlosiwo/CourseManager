<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<div class="container">
    <h2>Udostępnianie kursów</h2>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row g-4 mb-4">
        <div class="col-lg-6">
            <div class="card h-100">
                <div class="card-header">Udostępnij konkretnemu użytkownikowi</div>
                <div class="card-body">
                    <form th:action="@{/shares/user}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label for="courseIdUser" class="form-label">Kurs</label>
                            <select id="courseIdUser" name="courseId" class="form-select" required>
                                <option th:each="course : ${courses}" th:value="${course.id}" th:text="${course.title}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="targetUserId" class="form-label">Użytkownik</label>
                            <select id="targetUserId" name="targetUserId" class="form-select" required>
                                <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.username + ' (' + user.role + ')'}"></option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Udostępnij</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card h-100">
                <div class="card-header">Utwórz link publiczny</div>
                <div class="card-body">
                    <form th:action="@{/shares/public}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label for="courseIdPublic" class="form-label">Kurs</label>
                            <select id="courseIdPublic" name="courseId" class="form-select" required>
                                <option th:each="course : ${courses}" th:value="${course.id}" th:text="${course.title}"></option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-outline-primary">Utwórz publiczny link</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <h3>Udostępnienia utworzone przeze mnie</h3>
    <div class="table-responsive mb-4">
        <table class="table align-middle">
            <thead><tr><th>Kurs</th><th>Dla użytkownika</th><th>Link publiczny</th><th>Status</th><th>Akcja</th></tr></thead>
            <tbody>
            <tr th:each="share : ${createdShares}">
                <td th:text="${share.course.title}"></td>
                <td th:text="${share.targetUser != null ? share.targetUser.username : '-'}"></td>
                <td><a th:href="@{/public/share/{token}(token=${share.token})}" th:text="@{/public/share/{token}(token=${share.token})}"></a></td>
                <td th:text="${share.active ? 'AKTYWNY' : 'WYŁĄCZONY'}"></td>
                <td>
                    <form th:if="${share.active}" th:action="@{/shares/delete/{id}(id=${share.id})}" method="post" onsubmit="return confirm('Wyłączyć udostępnienie?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Wyłącz</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(createdShares)}"><td colspan="5" class="text-center text-muted">Nie utworzono jeszcze udostępnień.</td></tr>
            </tbody>
        </table>
    </div>

    <h3>Udostępnione dla mnie</h3>
    <div class="table-responsive">
        <table class="table align-middle">
            <thead><tr><th>Kurs</th><th>Udostępnił</th><th>Data</th></tr></thead>
            <tbody>
            <tr th:each="share : ${receivedShares}">
                <td><a th:href="@{/courses/{id}(id=${share.course.id})}" th:text="${share.course.title}"></a></td>
                <td th:text="${share.owner.username}"></td>
                <td th:text="${#temporals.format(share.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(receivedShares)}"><td colspan="3" class="text-center text-muted">Brak udostępnień.</td></tr>
            </tbody>
        </table>
    </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
