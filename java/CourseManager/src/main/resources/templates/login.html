<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Logowanie - CourseManager</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3>Logowanie</h3>
            </div>
            <div class="card-body">
                <!-- Komunikaty błędów logowania -->
                <div th:if="${param.error}" class="alert alert-danger">
                    Nieprawidłowa nazwa użytkownika lub hasło.
                </div>
                <div th:if="${param.logout}" class="alert alert-info">
                    Zostałeś pomyślnie wylogowany.
                </div>
                <div th:if="${param.registered}" class="alert alert-success">
                    Rejestracja zakończona pomyślnie. Możesz się teraz zalogować.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Nazwa użytkownika</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Hasło</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Zaloguj</button>
                    <a th:href="@{/register}" class="btn btn-link">Nie masz konta? Zarejestruj się</a>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
