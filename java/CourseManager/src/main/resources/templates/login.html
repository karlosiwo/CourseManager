<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Logowanie</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-4">
        <h2>Logowanie</h2>
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Login" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Hasło" required>
            </div>
            <button type="submit" class="btn btn-primary">Zaloguj</button>
        </form>
        <p class="mt-3"><a href="/register">Nie masz konta? Zarejestruj się</a></p>
    </div>
</div>
</body>
</html>
