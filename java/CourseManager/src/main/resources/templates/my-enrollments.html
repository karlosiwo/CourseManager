<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Moje zapisy</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<h2>Moje zapisy na kursy</h2>
<table class="table">
    <thead>
    <tr><th>Kurs</th><th>Data zapisu</th><th>Status</th><th>Akcja</th></tr>
    </thead>
    <tbody>
    <tr th:each="enr : ${enrollments}">
        <td th:text="${enr.course.title}"></td>
        <td th:text="${enr.enrollmentDate}"></td>
        <td th:text="${enr.status}"></td>
        <td>
            <form th:if="${enr.status == 'AKTYWNY'}" th:action="@{/cancel/{id}(id=${enr.id})}" method="post">
                <button type="submit" class="btn btn-danger btn-sm">Anuluj zapis</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
<a href="/courses" class="btn btn-secondary">Powrót do listy kursów</a>
</body>
</html>
