<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<body>
<div th:replace="fragments/header :: navbar"></div>
<div class="container">
    <h2>📌 Moje zapisy</h2>
    <div class="table-responsive">
        <table class="table">
            <thead><tr><th>Kurs</th><th>Data rozpoczęcia</th><th>Status</th><th></th></tr></thead>
            <tbody>
            <tr th:each="e : ${enrollments}">
                <td><a th:href="@{/courses/{id}(id=${e.course.id})}" th:text="${e.course.title}"></a></td>
                <td th:text="${e.course.startDate}"></td>
                <td><span class="badge bg-success">Zapisany</span></td>
                <td><a th:href="@{/enroll/cancel/{id}(id=${e.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Anulować zapis?')">Anuluj</a></td>
            </tr>
            </tbody>
        </table>
    </div>
    <a href="/courses" class="btn btn-primary">Przeglądaj kursy</a>
</div>
<div th:replace="fragments/footer :: footer"></div>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
