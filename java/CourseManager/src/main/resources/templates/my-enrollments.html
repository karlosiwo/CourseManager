<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<div class="container">
    <h2>Moje zapisy</h2>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div class="table-responsive">
        <table class="table align-middle">
            <thead><tr><th>Kurs</th><th>Data rozpoczęcia</th><th>Status</th><th>Akcja</th></tr></thead>
            <tbody>
            <tr th:each="e : ${enrollments}">
                <td><a th:href="@{/courses/{id}(id=${e.course.id})}" th:text="${e.course.title}"></a></td>
                <td th:text="${e.course.startDate}"></td>
                <td><span class="badge" th:classappend="${e.status == 'AKTYWNY'} ? 'bg-success' : 'bg-secondary'" th:text="${e.status}"></span></td>
                <td>
                    <form th:if="${e.status == 'AKTYWNY'}" th:action="@{/enroll/cancel/{id}(id=${e.id})}" method="post" class="d-inline" onsubmit="return confirm('Anulować zapis?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-sm btn-danger">Anuluj</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(enrollments)}"><td colspan="4" class="text-center text-muted">Nie masz jeszcze zapisów.</td></tr>
            </tbody>
        </table>
    </div>
    <a th:href="@{/courses}" class="btn btn-primary">Przeglądaj kursy</a>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
