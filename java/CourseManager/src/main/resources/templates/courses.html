<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Lista kursów</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css">
    <script src="/webjars/jquery/3.6.4/jquery.min.js"></script>
    <script src="/js/availability.js"></script>
</head>
<body class="container mt-4">
<h2>Kursy</h2>
<div sec:authorize="isAuthenticated()">
    <a href="/my-enrollments" class="btn btn-info">Moje zapisy</a>
    <a href="/logout" class="btn btn-secondary">Wyloguj</a>
</div>
<div sec:authorize="hasAnyRole('ADMIN','FULL_USER')">
    <a href="/courses/new" class="btn btn-primary mt-2">Dodaj nowy kurs</a>
</div>

<!-- Filtry (proste, można rozbudować) -->
<form method="get" class="row g-3 mt-2 mb-3">
    <div class="col-auto">
        <input type="text" name="category" class="form-control" placeholder="Kategoria" th:value="${currentCategory}">
    </div>
    <div class="col-auto">
        <input type="date" name="fromDate" class="form-control" th:value="${currentFromDate}">
    </div>
    <div class="col-auto">
        <select name="sort" class="form-select">
            <option value="">Sortuj</option>
            <option value="startDate" th:selected="${currentSort == 'startDate'}">Data rozpoczęcia</option>
            <option value="title" th:selected="${currentSort == 'title'}">Tytuł</option>
        </select>
    </div>
    <div class="col-auto">
        <select name="direction" class="form-select">
            <option value="asc" th:selected="${currentDirection == 'asc'}">Rosnąco</option>
            <option value="desc" th:selected="${currentDirection == 'desc'}">Malejąco</option>
        </select>
    </div>
    <div class="col-auto">
        <button type="submit" class="btn btn-secondary">Filtruj</button>
    </div>
</form>

<table class="table table-bordered mt-3">
    <thead>
    <tr>
        <th>Tytuł</th><th>Data rozpoczęcia</th><th>Kategoria</th><th>Wolne miejsca</th><th>Akcja</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="course : ${coursePage.content}">
        <td><a th:href="@{/courses/{id}(id=${course.id})}" th:text="${course.title}"></a></td>
        <td th:text="${course.startDate}"></td>
        <td th:text="${course.categoryName}"></td> <!-- Uwaga: w DTO może być categoryName -->
        <td id="seats-${course.id}">--</td>
        <td>
            <button class="btn btn-sm btn-success enroll-btn" th:data-id="${course.id}">Zapisz się</button>
            <div sec:authorize="hasAnyRole('ADMIN','FULL_USER')">
                <a th:href="@{/courses/edit/{id}(id=${course.id})}" class="btn btn-sm btn-warning">Edytuj</a>
                <a th:href="@{/courses/delete/{id}(id=${course.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Usunąć?')">Usuń</a>
            </div>
        </td>
    </tr>
    </tbody>
</table>

<!-- Paginacja -->
<nav th:if="${coursePage.totalPages > 1}">
    <ul class="pagination">
        <li class="page-item" th:classappend="${coursePage.first} ? 'disabled'">
            <a class="page-link" th:href="@{/courses(page=0, size=${coursePage.size}, sort=${currentSort}, direction=${currentDirection}, category=${currentCategory}, fromDate=${currentFromDate})}">«</a>
        </li>
        <li class="page-item" th:each="i : ${#numbers.sequence(0, coursePage.totalPages-1)}"
            th:classappend="${i == coursePage.number} ? 'active'">
            <a class="page-link" th:href="@{/courses(page=${i}, size=${coursePage.size}, sort=${currentSort}, direction=${currentDirection}, category=${currentCategory}, fromDate=${currentFromDate})}" th:text="${i+1}"></a>
        </li>
        <li class="page-item" th:classappend="${coursePage.last} ? 'disabled'">
            <a class="page-link" th:href="@{/courses(page=${coursePage.totalPages-1}, size=${coursePage.size}, sort=${currentSort}, direction=${currentDirection}, category=${currentCategory}, fromDate=${currentFromDate})}">»</a>
        </li>
    </ul>
</nav>

<script>
    $(document).ready(function() {
        $('.enroll-btn').each(function() {
            var btn = $(this);
            var courseId = btn.data('id');
            $.get('/api/courses/' + courseId + '/availability', function(data) {
                $('#seats-' + courseId).text(data.availableSeats);
            });
            btn.click(function() {
                $.get('/api/courses/' + courseId + '/availability', function(data) {
                    if (data.availableSeats > 0) {
                        $.post('/enroll/' + courseId, function() {
                            alert('Zapisano pomyślnie!');
                            location.reload();
                        }).fail(function() { alert('Błąd zapisu'); });
                    } else {
                        alert('Brak wolnych miejsc');
                    }
                });
            });
        });
    });
</script>
</body>
</html>
