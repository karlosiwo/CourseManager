<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Lista kursów</h2>
        <div sec:authorize="hasAnyRole('ADMIN','FULL_USER')">
            <a th:href="@{/courses/new}" class="btn btn-primary">Nowy kurs</a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card mb-4">
        <div class="card-body">
            <form method="get" class="row g-3 align-items-end" aria-label="Filtry listy kursów">
                <div class="col-md-3">
                    <label for="category" class="form-label">Kategoria</label>
                    <select id="category" name="category" class="form-select">
                        <option value="">Wszystkie</option>
                        <option th:each="cat : ${categories}" th:value="${cat.name}" th:text="${cat.name}" th:selected="${currentCategory == cat.name}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="fromDate" class="form-label">Data od</label>
                    <input id="fromDate" type="date" name="fromDate" class="form-control" th:value="${currentFromDate}">
                </div>
                <div class="col-md-2">
                    <label for="sort" class="form-label">Sortuj</label>
                    <select id="sort" name="sort" class="form-select">
                        <option value="startDate" th:selected="${currentSort == 'startDate'}">Data</option>
                        <option value="title" th:selected="${currentSort == 'title'}">Tytuł</option>
                        <option value="category.name" th:selected="${currentSort == 'category.name'}">Kategoria</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="direction" class="form-label">Kierunek</label>
                    <select id="direction" name="direction" class="form-select">
                        <option value="asc" th:selected="${currentDirection == 'asc'}">Rosnąco</option>
                        <option value="desc" th:selected="${currentDirection == 'desc'}">Malejąco</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-secondary w-100">Filtruj</button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr><th>Tytuł</th><th>Data</th><th>Kategoria</th><th>Wolne miejsca</th><th>Akcje</th></tr>
            </thead>
            <tbody>
            <tr th:each="course : ${coursePage.content}">
                <td><a th:href="@{/courses/{id}(id=${course.id})}" th:text="${course.title}" class="fw-bold text-decoration-none"></a></td>
                <td th:text="${#temporals.format(course.startDate, 'dd.MM.yyyy')}"></td>
                <td th:text="${course.categoryName}"></td>
                <td><span th:id="'seats-' + ${course.id}" class="badge bg-info text-dark">--</span></td>
                <td>
                    <form th:action="@{/enroll/{id}(id=${course.id})}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-sm btn-outline-success enroll-btn" th:data-id="${course.id}">Zapisz się</button>
                    </form>
                    <div sec:authorize="hasAnyRole('ADMIN','FULL_USER')" class="d-inline">
                        <a th:href="@{/courses/edit/{id}(id=${course.id})}" class="btn btn-sm btn-outline-warning">Edytuj</a>
                        <form th:action="@{/courses/delete/{id}(id=${course.id})}" method="post" class="d-inline" onsubmit="return confirm('Usunąć kurs?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Usuń</button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${coursePage.totalElements == 0}"><td colspan="5" class="text-center text-muted">Brak kursów dla wybranych filtrów.</td></tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${coursePage.totalPages > 1}" aria-label="Stronicowanie kursów">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${coursePage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/courses(page=0, size=${coursePage.size}, sort=${currentSort}, direction=${currentDirection}, category=${currentCategory}, fromDate=${currentFromDate})}">«</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, coursePage.totalPages - 1)}" th:classappend="${i == coursePage.number} ? 'active'">
                <a class="page-link" th:href="@{/courses(page=${i}, size=${coursePage.size}, sort=${currentSort}, direction=${currentDirection}, category=${currentCategory}, fromDate=${currentFromDate})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${coursePage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/courses(page=${coursePage.totalPages - 1}, size=${coursePage.size}, sort=${currentSort}, direction=${currentDirection}, category=${currentCategory}, fromDate=${currentFromDate})}">»</a>
            </li>
        </ul>
    </nav>
</div>

<script src="/webjars/jquery/3.6.4/jquery.min.js"></script>
<script th:inline="javascript">
    $(document).ready(function() {
        $('.enroll-btn').each(function() {
            const btn = $(this);
            const courseId = btn.data('id');
            const seatsSpan = $('#seats-' + courseId);
            $.get('/api/courses/' + courseId + '/availability')
                .done(function(data) { seatsSpan.text(data.availableSeats); })
                .fail(function() { seatsSpan.text('?'); });
        });
    });
</script>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
