<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Szczegóły kursu</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<h2 th:text="${course.title}"></h2>
<p><strong>Opis:</strong> <span th:text="${course.description}"></span></p>
<p><strong>Data:</strong> <span th:text="${course.startDate}"></span></p>
<p><strong>Kategoria:</strong> <span th:text="${course.category.name}"></span></p>
<p><strong>Prowadzący:</strong> <span th:text="${course.instructor.firstName + ' ' + course.instructor.lastName}"></span></p>
<p><strong>Maksymalna liczba miejsc:</strong> <span th:text="${course.maxSeats}"></span></p>
<a href="/courses" class="btn btn-secondary">Powrót</a>
</body>
</html>
