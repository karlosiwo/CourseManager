<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container">
    <div class="card shadow-sm border-0 rounded-4 p-4" th:object="${course}">
        <div class="d-flex justify-content-between gap-3 flex-wrap">
            <h2 th:text="*{title}"></h2>
            <span sec:authorize="hasAnyRole('ADMIN','FULL_USER')">
                <a th:href="@{/courses/edit/{id}(id=*{id})}" class="btn btn-warning">Edytuj</a>
                <form th:action="@{/courses/delete/{id}(id=*{id})}" method="post" class="d-inline" onsubmit="return confirm('Usunąć kurs?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-danger">Usuń</button>
                </form>
            </span>
        </div>
        <hr>
        <p><strong>Opis:</strong> <span th:text="*{description}"></span></p>
        <p><strong>Data rozpoczęcia:</strong> <span th:text="*{startDate}"></span></p>
        <p><strong>Maksymalna liczba miejsc:</strong> <span th:text="*{maxSeats}"></span></p>
        <p><strong>Kategoria:</strong> <span th:text="*{category != null ? category.name : '-'}"></span></p>
        <p><strong>Prowadzący:</strong> <span th:text="*{instructor != null ? instructor.name : '-'}"></span></p>
        <div class="mt-3">
            <form th:action="@{/enroll/{id}(id=*{id})}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-success">Zapisz się</button>
            </form>
            <a sec:authorize="hasAnyRole('ADMIN','FULL_USER')" th:href="@{/shares}" class="btn btn-outline-primary">Udostępnij kurs</a>
            <a th:href="@{/courses}" class="btn btn-secondary">Powrót do listy</a>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
