# ===============================
# Baza danych (PostgreSQL)
# ===============================
# Po??czenie z baz? w kontenerze Docker (nazwa us?ugi 'postgresql')
spring.datasource.url=jdbc:postgresql://postgresql:5432/coursemanager
spring.datasource.username=coursemanager_app
spring.datasource.password=app_password
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP ? pul? po??cze?
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.validation-timeout=5000

# ===============================
# JPA / Hibernate
# ===============================
# DDL wykonujemy r?cznie przez skrypty SQL (schema.sql, procedures.sql)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===============================
# Thymeleaf (widoki)
# ===============================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===============================
# Spring Security
# ===============================
# Pozwala na cykliczne referencje (tymczasowo, dla rozwoju)
spring.main.allow-circular-references=true

# ===============================
# Logowanie (debugowanie)
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# Serwer HTTP
# ===============================
server.port=8080
server.servlet.session.timeout=30m