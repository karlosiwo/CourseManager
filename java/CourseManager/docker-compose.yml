services:
  postgresql:
    image: postgres:16
    container_name: coursemanager-postgres
    environment:
      POSTGRES_DB: coursemanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./src/main/resources/db/procedures.sql:/docker-entrypoint-initdb.d/2-procedures.sql
      - ./src/main/resources/db/init-db-users.sql:/docker-entrypoint-initdb.d/3-init-db-users.sql
      - ./src/main/resources/db/data.sql:/docker-entrypoint-initdb.d/4-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coursemanager"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coursemanager-network

  app:
    build: .
    container_name: coursemanager-app
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/coursemanager
      SPRING_DATASOURCE_USERNAME: coursemanager_app
      SPRING_DATASOURCE_PASSWORD: app_password
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - coursemanager-network
    restart: on-failure

volumes:
  postgres_data:

networks:
  coursemanager-network: